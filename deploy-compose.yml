services:
  api:
    # build:
    #   context: .
    #   dockerfile: Dockerfile.multi
    #   target: api-build
    image: ghcr.io/somalabs/iazzas-api:latest
    container_name: LibreChat-API
    ports:
      - 3080:3080
    depends_on:
      - mongodb
      - rag_api
      - code-gateway
      - ms365-mcp
    restart: always
    extra_hosts:
    - "host.docker.internal:host-gateway"
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongodb:27017/LibreChat
      - MEILI_HOST=http://meilisearch:7700
      - RAG_PORT=${RAG_PORT:-8000}
      - RAG_API_URL=http://rag_api:${RAG_PORT:-8000}
      - LIBRECHAT_CODE_BASEURL=http://code-gateway:8080/v1
    volumes:
      - type: bind
        source: ./librechat.yaml
        target: /app/librechat.yaml
      - ./mcp/azzas:/opt/azzas-mcp:ro
      - /home/correa/azzas-mcp-creds:/root/.mcp
      - ./images:/app/client/public/images
      - ./uploads:/app/uploads
      - ./logs:/app/api/logs

  code-gateway:
    container_name: code-gateway
    image: ghcr.io/somalabs/iazzas-code-gateway:latest
    environment:
      - USE_LOCAL_EXEC=true
      - GATEWAY_API_KEY=${LIBRECHAT_CODE_API_KEY}
      - PORT=8080
      - EXEC_TIMEOUT_MS=30000
      - PYTHONPATH=/opt/user-deps
    volumes:
      - ./code-interpreter-gateway/waldemiro.py:/opt/user-deps/waldemiro.py:ro
    restart: always

  ms365-mcp:
    container_name: ms365-mcp
    image: ghcr.io/somalabs/iazzas-ms365-mcp:latest
    command:
      - "--http"
      - "3000"
      - "--org-mode"
      - "--public-url=https://ai-azzas.somalabs.com.br/ms365"
    environment:
      - MS365_MCP_CLIENT_ID=${MS365_CLIENT_ID}
      - MS365_MCP_CLIENT_SECRET=${MS365_CLIENT_SECRET}
      - MS365_MCP_TENANT_ID=${MS365_TENANT_ID}
      - MS365_MCP_PUBLIC_URL=https://ai-azzas.somalabs.com.br/ms365
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - |-
          node -e "require('http').get('http://localhost:3000/', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  client:
    image: nginx:1.27.0-alpine
    container_name: LibreChat-NGINX
    ports:
      - 80:80
      - 443:443
    depends_on:
      - api
    restart: always
    volumes:
      - ./client/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./custom:/custom:ro
  mongodb:
    container_name: chat-mongodb
    # ports:  # Uncomment this to access mongodb from outside docker, not safe in deployment
    #   - 27018:27017
    image: mongo:8.0.20
    restart: always
    volumes:
      - ./data-node:/data/db
    command: mongod --noauth
  meilisearch:
    container_name: chat-meilisearch
    image: getmeili/meilisearch:v1.35.1
    restart: always
    # ports: # Uncomment this to access meilisearch from outside docker
    #   - 7700:7700 # if exposing these ports, make sure your master key is not the default value
    env_file:
      - .env
    environment:
      - MEILI_HOST=http://meilisearch:7700
      - MEILI_NO_ANALYTICS=true
    volumes:
      - ./meili_data_v1.35.1:/meili_data
  vectordb:
    image: pgvector/pgvector:0.8.0-pg15-trixie
    environment:
      POSTGRES_DB: mydatabase
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
    restart: always
    volumes:
      - pgdata2:/var/lib/postgresql/data
  rag_api:
    image: registry.librechat.ai/danny-avila/librechat-rag-api-dev-lite:latest
    environment:
      - DB_HOST=vectordb
      - RAG_PORT=${RAG_PORT:-8000}
    restart: always
    depends_on:
      - vectordb
    env_file:
      - .env

volumes:
  pgdata2:
