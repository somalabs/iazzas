    startup: false
    requiresOAuth: true
    oauth: {}
    title: "Notion"
    description: |
      Conecta com seu workspace pessoal do Notion e transforma páginas, bases de dados, blocos e comentários em contexto utilizável direto no chat.

      O que faz:
      • Busca livre em todo o workspace ou query estruturada em bases (filter/sort)
      • Leitura completa de páginas, blocos aninhados e propriedades (com paginação automática)
      • Criação e edição de páginas e blocos (texto vira blocos nativos do Notion)
      • Comentários em páginas e blocos específicos
      • Listagem de usuários e info do workspace

      Exemplos:
      • "Resume a página de arquitetura do projeto X"
      • "Lista as decisões registradas na base 'Roadmap' nos últimos 30 dias"
      • "Cria uma página com o resumo desta conversa no espaço Y"
      • "Adiciona o comentário 'revisar com o time de dados' na página Z"

      Requer login pessoal Notion via OAuth.
    iconPath: "/assets/notion.svg"
  atlassian:
    type: streamable-http
    url: https://mcp.atlassian.com/v1/mcp/authv2
    timeout: 60000
    startup: false
    requiresOAuth: true
    oauth: {}
    # Ainda não 100% homologado — exibido esmaecido e como "em desenvolvimento",
    # sem permitir conexão. Remover quando o conector estiver pronto.
    inDevelopment: true
    title: "Atlassian"
    description: |
      Acesso integrado a Jira e Confluence direto do chat — consulta, busca, criação e atualização sem sair da conversa.

      Jira:
      • Busca por JQL avançado, listagem de projetos visíveis e tipos de issue
      • Leitura completa de issues, remote links e tipos de link permitidos
      • Criação, edição e transição de status (com validação de workflow)
      • Comentários, worklog e criação de links entre issues (blocks, relates, depends on)

      Confluence:
      • Listagem de espaços, páginas e descendentes hierárquicos
      • Busca por CQL
      • Criação, edição e leitura de páginas
      • Comentários inline e footer

      Exemplos:
      • "Quais bugs P1 estão em progresso no projeto IAZ?"
      • "Resume a página de runbook do incidente 4321 no Confluence"
      • "Cria um ticket no IAZ com o título 'Refazer dashboard de churn' e atribui pra Fulano"
      • "Move o IAZ-1023 pra 'In Review' e adiciona o comentário X"

      Requer login pessoal Atlassian via OAuth.
    iconPath: "/assets/atlassian.svg"
  miro:
    type: streamable-http
    url: https://mcp.miro.com/
    timeout: 60000
    startup: false
    requiresOAuth: true
    oauth: {}
    title: "Miro"
    description: |
      Lê e manipula os seus boards do Miro — frames, sticky notes, shapes, conectores, texto e imagens — transformando workshops e brainstorms em texto pronto pra usar.

      O que faz:
      • Lista boards do workspace, membros e permissões
      • Leitura completa de itens por board (frames, widgets, conexões, agrupamentos)
      • Criação e edição de widgets (sticky, shape, text, frame) com cor e posição
      • Movimentação e organização de itens por coordenadas
      • Exportação do conteúdo de um board pra resumo estruturado

      Exemplos:
      • "Resume os post-its do board de discovery do produto X"
      • "Lista todas as decisões marcadas em verde no board de planning"
      • "Transforma o customer journey do board Y em um documento estruturado"
      • "Cria 5 sticky notes amarelos com os blockers desta sprint no board Z"

      Requer login pessoal Miro via OAuth.
    iconPath: "/assets/miro.svg"

  # Microsoft 365 (Outlook Mail/Calendar, Teams, OneDrive, OneNote, Excel) via
  # softeria/ms-365-mcp-server self-hospedado. Pré-requisito: App Registration
  # no Entra ID Azzas com delegated permissions Graph (ver docs/env-production.md).
  # OAuth per-user via DCR contra o próprio ms365-mcp; LibreChat e usuário
  # tratam exatamente como Notion/Atlassian/Miro acima. URL interna pra
  # MCP-RPC; metadata OAuth aponta pra MS365_PUBLIC_URL.
  microsoft365:
    type: streamable-http
    url: http://ms365-mcp:3000/mcp
    timeout: 60000
    startup: false
    requiresOAuth: true
    oauth: {}
    # O ms-365-mcp-server expõe ~250 ferramentas (Graph API inteira: SharePoint,
    # Planner, To-Do, Groups, presence, meetings etc.). Para uso geral isso infla
    # o contexto e induz alucinação. availableTools curam o catálogo às ~50 mais
    # usadas (Mail, Calendário, Teams, OneDrive, OneNote, Excel). Fail-open: se
    # nenhum nome casar, todas as tools voltam (ver MCPServerInspector).
    availableTools:
      # Mail
      - list-mail-messages
      - list-mail-folders
      - list-mail-folder-messages
      - get-mail-message
      - send-mail
      - create-draft-email
      - reply-mail-message
      - reply-all-mail-message
      - forward-mail-message
      - delete-mail-message
      - move-mail-message
      - list-mail-attachments
      # Calendário
      - list-calendar-events
      - get-calendar-event
      - create-calendar-event
      - update-calendar-event
      - delete-calendar-event
      - cancel-calendar-event
      - get-calendar-view
      - find-meeting-times
      - list-calendars
      # Teams / Chat
      - list-chats
      - get-chat
      - list-chat-messages
      - send-chat-message
      - reply-to-chat-message
      - list-joined-teams
      - list-team-channels
      - list-channel-messages
      - send-channel-message
      - reply-to-channel-message
      - list-team-members
      # OneDrive
      - list-drives
      - list-folder-files
      - get-drive-item
      - search-onedrive-files
      - upload-file-content
      - create-drive-item-share-link
      # OneNote
      - list-onenote-notebooks
      - list-onenote-notebook-sections
      - list-onenote-section-pages
      - get-onenote-page-content
      - create-onenote-page
      # Excel
      - list-excel-worksheets
      - list-excel-tables
      - get-excel-range
      - get-excel-used-range
      - update-excel-range
      - list-excel-table-rows
      - add-excel-table-rows
      # Perfil / busca
      - get-current-user
      - search-query
    title: "Microsoft 365"
    description: |
      Conecta com sua conta Azzas e dá acesso integrado a Outlook, Teams, OneDrive, OneNote e Excel direto do chat.

      Outlook:
      • Mail: listar inbox/folders, ler, buscar, rascunhar, enviar, responder, encaminhar, deletar
      • Calendário: listar eventos, criar/editar/cancelar reuniões, sugerir horários disponíveis

      Teams:
      • Listar times, canais e mensagens recentes
      • Postar mensagem em canal
      • Buscar mensagens por texto

      OneDrive:
      • Listar drives e arquivos, baixar e enviar conteúdo
      • Gerar link de compartilhamento

      OneNote:
      • Listar cadernos, seções e páginas
      • Ler conteúdo e criar páginas novas

      Excel:
      • Abrir workbook, listar planilhas e tabelas
      • Ler ou gravar ranges
      • Operações em tabelas estruturadas

      Exemplos:
      • "Resume os e-mails não lidos de hoje do remetente X"
      • "Agenda reunião de 30 min com Fulano e Beltrana terça ou quarta de manhã"
      • "Pega a planilha 'Forecast 2026' do OneDrive e dá o total por marca"
      • "Resume os últimos 7 dias do canal 'IAzzas - Lançamento' no Teams"

      Requer login com sua conta Azzas via OAuth.
    iconPath: "/assets/microsoft-icon.svg"

