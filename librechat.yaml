mcpServers:
  # JWT passthrough: o id_token do user logado (Authentik em prod, Azure em dev)
  # vai no header Authorization. O bq-analista valida assinatura, extrai email
  # e checa allowlist por agent. Allowlist de cada deploy é independente.
  azzas_vendas_linx:
    type: streamable-http
    url: https://bq-analista-production.up.railway.app/mcp
    headers:
      Authorization: "Bearer {{LIBRECHAT_MCP_PROXY_JWT}}"
    timeout: 60000
    title: "Vendas Linx"
    description: |
      Consulta na silver Linx do BigQuery os KPIs comerciais das 9 marcas da BU Varejo direto do chat, sem abrir o BI.

      KPIs disponíveis:
      • Venda líquida e bruta, CMV, markup, margem bruta, taxa de desconto, ticket médio, PA, quebra
      • Comparativos YoY e MoM, SSS / Loja Nova / Sem classificação (com snapshot único por período)

      Dimensões:
      • Marca, loja (5 contextos: atendimento, faturamento, origem, destino, vendedor), produto/cor/tamanho/grade
      • Coleção e fase (ON / SALE / OFF) — com alerta automático de MACO inflado em OFF
      • Canal: Físico, Online, Omni, Vitrine

      Exemplos:
      • "Venda líquida da Animale por loja em setembro/2025"
      • "Top 10 produtos por ticket médio na fase ON da coleção VER25"
      • "Markup das marcas no semestre com aviso de fase OFF"
      • "SSS comparable por marca nos últimos 3 meses"
    iconPath: "/assets/a2154.png"
  azzas_devolucoes:
    type: streamable-http
    url: https://analista-devolucoes-production.up.railway.app/mcp
    headers:
      Authorization: "Bearer {{LIBRECHAT_MCP_PROXY_JWT}}"
    timeout: 60000
    title: "Devoluções"
    description: |
      Analisa a tabela CDC de trocas e devoluções das 9 marcas do grupo, com regras de "foto corrente" já aplicadas (sem precisar saber de status histórico).

      O que entrega:
      • Volume e taxa de reversa por marca, loja, produto, estado e cidade
      • Motivos de devolução agregados ou abertos
      • SLA logístico reverso: previsto vs. realizado, atrasos por marca/loja/transportadora
      • Análise qualitativa: parsing dos comentários de clientes
      • Distinção entre estorno puro, reversa total e troca

      Diferencial: rankings de produto saem com a foto do item inline, sem precisar abrir o ERP.

      Exemplos:
      • "Principais motivos de devolução em julho na Animale"
      • "Top 20 produtos com maior taxa de devolução no último trimestre"
      • "SLA reverso médio por marca, com casos acima de 7 dias destacados"
      • "Análise qualitativa dos comentários em devoluções de calçado"
    iconPath: "/assets/a2154.png"
  azzas_ciclo:
    type: streamable-http
    url: https://agent-atacado-production.up.railway.app/mcp
    headers:
      Authorization: "Bearer {{LIBRECHAT_MCP_PROXY_JWT}}"
    timeout: 60000
    title: "Ciclo de Venda Atacado"
    description: |
      Cobre 19 tabelas do canal Atacado (BU Fashion & Lifestyle), organizadas em 7 sub-sistemas que dialogam entre si:

      • Ciclo de venda: pedido, cancelamento, embalado (status de caixa no CD), faturamento (NF), devolução, metas e quebra
      • Financeiro: inadimplência, bloqueio, aging por cliente, histórico de bloqueios
      • Somaplace (marketplace): adesão de multimarcas e GMV por produto/marca
      • Afiliados: vendedoras digitais, comissão e venda gerada por canal
      • E-commerce: eventos de venda (uso restrito — só quando o termo "e-commerce" for explícito)
      • Prateleira Infinita: estoque do programa para recomendação e mix por linha/segmento
      • Cessão Varejo: snapshot de venda a entregar, produção prevista e atraso por produto/tamanho

      Dimensões: representante, coordenador, coleção (VER/AV/INV/AI), marca, cluster de cliente, exclusividade atacado, venda aberta/fechada.

      Exemplos:
      • "Atingimento de meta dos top 20 representantes na coleção VER25"
      • "GMV Somaplace por marca no último trimestre"
      • "Quebra de embalado vs. quebra financeira na AV25"
      • "Carteira de clientes com bloqueio financeiro ativo por cluster"
    iconPath: "/assets/a2154.png"
  azzas_clientes:
    type: streamable-http
    url: https://agent-clientes-production.up.railway.app/mcp
    headers:
      Authorization: "Bearer {{LIBRECHAT_MCP_PROXY_JWT}}"
    timeout: 60000
    title: "Clientes"
    description: |
      Análise da base de clientes do grupo sob duas perspectivas independentes: ano de competência (tabela agregada, queries baratas) e janela móvel de 12 meses (view com fato CRM). Cobertura desde 2019.

      O que entrega:
      • Segmentação Novo / Retido / Reativado, com sub-status Compra Única / Recorrente
      • Base ativa por marca, recência (90d e 365d), frequência e cluster de frequência
      • LTV, ticket médio, PA e PM por marca, loja, canal de entrada e canal do cliente
      • Tratamento correto de Multicanal e Multicanal c/ Franquia (com dedup)

      Exemplos:
      • "Distribuição Novo/Retido/Reativado por marca em 2026"
      • "Base ativa Multicanal nos últimos 12 meses"
      • "Recência média de clientes Animale e Farm em janela móvel"
      • "Cluster de frequência por marca no ano de competência"

      ⚠ A receita aqui não bate com Vendas Linx por desenho: marketplaces (ex.: Mercado Livre) geram receita para a Azzas mas o cliente final pertence ao marketplace e fica fora deste universo.
    iconPath: "/assets/a2154.png"
  azzas_midia_crm:
    type: streamable-http
    url: https://agent-midia-e-crm-production.up.railway.app/mcp
    headers:
      Authorization: "Bearer {{LIBRECHAT_MCP_PROXY_JWT}}"
    timeout: 60000
    title: "Mídia e CRM"
    description: |
      Cruza mídia paga e CRM multicanal das marcas do grupo direto do chat, sobre os projetos de BI de marketing (soma-crm-bi, soma-bi-ga4, soma-dl-refined-online).

      O que entrega:
      • Mídia paga (Google Ads via GA4 e histórico GA3): investimento, impressões, cliques, sessões, transações e receita por marca, campanha, veículo e canal — com custo já convertido de USD para BRL e ROAS/ROI calculados
      • CRM multicanal: e-mail (Dito), push, SMS e WhatsApp — funil de mensageria, conversão e ROI por canal
      • Segmentação de base (McKinsey) e clientes ativos sob a ótica de performance de marketing
      • Receita e segmentação de vendas online

      Dimensões: marca, campanha, grupo de anúncio, veículo/canal de mídia, plataforma (web/app), período.

      Exemplos:
      • "ROAS da Farm em Google Ads no último trimestre, por campanha"
      • "Investimento total de mídia paga por marca em outubro, em reais"
      • "ROI dos disparos de e-mail Dito da Animale no mês"
      • "Funil de mensageria push vs. e-mail nas últimas 4 semanas"
    iconPath: "/assets/a2154.png"
  azzas_people_rh:
    type: streamable-http
    url: https://agent-people-rh-production.up.railway.app/mcp
    headers:
      Authorization: "Bearer {{LIBRECHAT_MCP_PROXY_JWT}}"
    timeout: 60000
    title: "People RH"
    description: |
      Consulta self-service do seu cadastro de colaborador a partir da sua matrícula — sem abrir chamado com o RH.

      O que responde (sobre os seus próprios dados):
      • Quem é a sua BP (Business Partner de RH) e o seu gestor
      • Sua diretoria, área e lotação / centro de custo
      • Data de admissão e tempo de casa
      • Elegibilidade de férias (se já adquiriu o direito — 12 meses desde a admissão)

      Como usar: informe a sua matrícula no chat e pergunte. Respostas são pontuais e individuais (sem listas, rankings ou relatórios).

      Exemplos:
      • "Minha matrícula é 12345, quem é minha BP?"
      • "Qual a minha data de admissão e tempo de casa?"
      • "Já tenho direito a férias?"

      ⚠ Saldo de dias e férias já gozadas não estão nesta base — para isso, procure a sua BP.
    iconPath: "/assets/a2154.png"

  # MCPs externos SaaS — OAuth per-user com Dynamic Client Registration (RFC 7591).
  # Não tem app pré-registrado; LibreChat se registra no provider na primeira conexão.
  # Token de cada user fica em mongo:tokens com identifier "mcp:{name}".
  # Redirect URI gerado automaticamente: {{DOMAIN_SERVER}}/api/mcp/{name}/oauth/callback
