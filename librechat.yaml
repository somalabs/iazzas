webSearch:
  searchProvider: "serper"
  serperApiKey: "${SERPER_API_KEY}"
  scraperProvider: "firecrawl"
  firecrawlApiKey: "${FIRECRAWL_API_KEY}"
  rerankerType: "jina"
  jinaApiKey: "${JINA_API_KEY}"
  safeSearch: 1
  scraperTimeout: 10000

fileConfig:
  endpoints:
    google:
      fileLimit: 10
      fileSizeLimit: 25
      supportedMimeTypes:
        - application/pdf
        - text/csv
        - text/plain
        - text/markdown
        - application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
        - application/vnd.ms-excel
        - application/vnd.openxmlformats-officedocument.wordprocessingml.document
        - application/vnd.openxmlformats-officedocument.presentationml.presentation
        - application/json
        - image/jpeg
        - image/png
        - image/webp
    agents:
      fileLimit: 10
      fileSizeLimit: 25
      supportedMimeTypes:
        - application/pdf
        - text/csv
        - text/plain
        - text/markdown
        - application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
        - application/vnd.ms-excel
        - application/vnd.openxmlformats-officedocument.wordprocessingml.document
        - application/vnd.openxmlformats-officedocument.presentationml.presentation
        - application/json
        - image/jpeg
        - image/png
        - image/webp

mcpServers:
  # JWT passthrough: o id_token do user logado (Authentik em prod, Azure em dev)
  # vai no header Authorization. O bq-analista valida assinatura, extrai email
  # e checa allowlist por agent. Allowlist de cada deploy é independente.
  azzas_vendas_linx:
    type: streamable-http
    url: https://bq-analista-production.up.railway.app/mcp
    headers:
      Authorization: "Bearer {{LIBRECHAT_MCP_PROXY_JWT}}"
    timeout: 60000
  azzas_devolucoes:
    type: streamable-http
    url: https://analista-devolucoes-production.up.railway.app/mcp
    headers:
      Authorization: "Bearer {{LIBRECHAT_MCP_PROXY_JWT}}"
    timeout: 60000
  azzas_ciclo:
    type: streamable-http
    url: https://agent-atacado-production.up.railway.app/mcp
    headers:
      Authorization: "Bearer {{LIBRECHAT_MCP_PROXY_JWT}}"
    timeout: 60000
  azzas_clientes:
    type: streamable-http
    url: https://agent-clientes-production.up.railway.app/mcp
    headers:
      Authorization: "Bearer {{LIBRECHAT_MCP_PROXY_JWT}}"
    timeout: 60000

  # MCPs externos SaaS — OAuth per-user com Dynamic Client Registration (RFC 7591).
  # Não tem app pré-registrado; LibreChat se registra no provider na primeira conexão.
  # Token de cada user fica em mongo:tokens com identifier "mcp:{name}".
  # Redirect URI gerado automaticamente: {{DOMAIN_SERVER}}/api/mcp/{name}/oauth/callback
  # (DOMAIN_SERVER precisa estar setado no .env de prod com o domínio público do IAzzas.)
  notion:
    type: streamable-http
    url: https://mcp.notion.com/mcp
    timeout: 60000
    startup: false
    requiresOAuth: true
    oauth: {}
  atlassian:
    type: streamable-http
    url: https://mcp.atlassian.com/v1/mcp/authv2
    timeout: 60000
    startup: false
    requiresOAuth: true
    oauth: {}
  miro:
    type: streamable-http
    url: https://mcp.miro.com/
    timeout: 60000
    startup: false
    requiresOAuth: true
    oauth: {}

  # Microsoft 365 (Outlook Mail/Calendar, Teams, OneDrive, OneNote, Excel) via
  # softeria/ms-365-mcp-server self-hospedado. Pré-requisito: App Registration
  # no Entra ID Azzas com delegated permissions Graph (ver docs/env-production.md).
  # OAuth per-user via DCR contra o próprio ms365-mcp; LibreChat e usuário
  # tratam exatamente como Notion/Atlassian/Miro acima. URL interna pra
  # MCP-RPC; metadata OAuth aponta pra MS365_PUBLIC_URL.
  microsoft365:
    type: streamable-http
    url: http://ms365-mcp:3000/mcp
    timeout: 60000
    startup: false
    requiresOAuth: true
    oauth: {}

  # Rollback: descomente o bloco abaixo e remova os 4 acima pra voltar ao stdio.
  # azzas:
  #   type: stdio
  #   command: node
  #   args:
  #     - /opt/azzas-mcp/index.js
  #   timeout: 60000
