webSearch:
  searchProvider: "serper"
  serperApiKey: "${SERPER_API_KEY}"
  scraperProvider: "firecrawl"
  firecrawlApiKey: "${FIRECRAWL_API_KEY}"
  rerankerType: "jina"
  jinaApiKey: "${JINA_API_KEY}"
  safeSearch: 1
  scraperTimeout: 10000

fileConfig:
  endpoints:
    google:
      fileLimit: 10
      fileSizeLimit: 25
      supportedMimeTypes:
        - application/pdf
        - text/csv
        - text/plain
        - text/markdown
        - application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
        - application/vnd.ms-excel
        - application/vnd.openxmlformats-officedocument.wordprocessingml.document
        - application/vnd.openxmlformats-officedocument.presentationml.presentation
        - application/json
        - image/jpeg
        - image/png
        - image/webp
    agents:
      fileLimit: 10
      fileSizeLimit: 25
      supportedMimeTypes:
        - application/pdf
        - text/csv
        - text/plain
        - text/markdown
        - application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
        - application/vnd.ms-excel
        - application/vnd.openxmlformats-officedocument.wordprocessingml.document
        - application/vnd.openxmlformats-officedocument.presentationml.presentation
        - application/json
        - image/jpeg
        - image/png
        - image/webp

mcpServers:
  azzas:
    type: stdio
    command: node
    args:
      - /opt/azzas-mcp/index.js
    timeout: 60000
