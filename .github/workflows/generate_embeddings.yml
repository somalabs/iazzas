name: 'generate_embeddings'
on:
  # Trigger de push removido: o IAzzas não usa o doc-search por embeddings do
  # upstream (sem backend Supabase), então rodava em todo commit de docs/** e
  # falhava com "supabaseUrl is required". Mantido só como dispatch manual caso
  # o Supabase venha a ser configurado no futuro.
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: supabase/embeddings-generator@v0.0.5
        with:
          supabase-url: ${{ secrets.SUPABASE_URL }}
          supabase-service-role-key: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          openai-key: ${{ secrets.OPENAI_DOC_EMBEDDINGS_KEY }}
          docs-root-path: 'docs'