name: Build and Push Code-Gateway Image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'code-interpreter-gateway/**'
      - '.github/workflows/code-gateway-image.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: code-interpreter-gateway/package-lock.json

      - name: Install and build TypeScript
        working-directory: code-interpreter-gateway
        run: |
          npm ci
          npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./code-interpreter-gateway
          file: ./code-interpreter-gateway/Dockerfile
          push: true
          tags: |
            ghcr.io/somalabs/iazzas-code-gateway:latest
            ghcr.io/somalabs/iazzas-code-gateway:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
