name: Build and Push MS365 MCP Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Tag of softeria/ms-365-mcp-server to build (e.g. v0.112.2)'
        required: true
        default: 'v0.112.2'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout softeria/ms-365-mcp-server
        uses: actions/checkout@v4
        with:
          repository: softeria/ms-365-mcp-server
          ref: ${{ github.event.inputs.version }}

      - name: Align release stage Node version with builder
        run: sed -i 's|FROM node:20-alpine AS release|FROM node:24-alpine AS release|' Dockerfile

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/somalabs/iazzas-ms365-mcp:${{ github.event.inputs.version }}
            ghcr.io/somalabs/iazzas-ms365-mcp:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
