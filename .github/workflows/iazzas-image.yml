name: Build and Push IAzzas Image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'api/**'
      - 'client/**'
      - 'packages/**'
      - 'config/**'
      - 'Dockerfile.multi'
      - '.github/workflows/iazzas-image.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare environment
        run: cp .env.example .env

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.multi
          target: api-build
          push: true
          tags: |
            ghcr.io/somalabs/iazzas-api:latest
            ghcr.io/somalabs/iazzas-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
